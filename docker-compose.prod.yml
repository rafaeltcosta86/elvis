version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elvis_prod

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elvis_prod

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-elvis}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elvis_prod

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elvis_prod

  baileys:
    build:
      context: .
      dockerfile: ./apps/baileys/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - ELVIS_API_URL=http://api:3000
    volumes:
      - baileys_auth:/data/auth
    depends_on:
      - api
    networks:
      - elvis_prod

volumes:
  postgres_data_prod:
  redis_data_prod:
  baileys_auth:

networks:
  elvis_prod:
    driver: bridge
