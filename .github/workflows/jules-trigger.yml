name: Acionar Jules em violações de arquitetura

on:
  issues:
    types: [opened, labeled]

jobs:
  trigger-jules:
    name: Notificar Jules sobre violação de arquitetura
    # Roda quando a issue tem (ou recém ganhou) o label architecture-violation
    if: contains(github.event.issue.labels.*.name, 'architecture-violation')
    runs-on: ubuntu-latest
    steps:
      - name: Comentar na issue acionando Jules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;

            const body = [
              '@google-labs-jules Por favor, corrija a violação de arquitetura descrita nesta issue.',
              '',
              '**Passos obrigatórios antes de começar:**',
              '1. `git fetch origin && git checkout main && git pull` — sempre partir do HEAD atual de main',
              '2. Ler `AGENTS.md` — instruções completas para agentes neste repositório',
              '3. Ler `docs/architecture.md` — invariantes de ouro e Definition of Done',
              '',
              '**Regras de implementação:**',
              '- Corrigir apenas o que a violação aponta — não refatorar código não relacionado',
              '- Rodar `pnpm --filter api exec vitest run` antes de criar o PR',
              `- Incluir \`Closes #${issueNumber}\` no corpo do PR`,
              '- Não commitar direto em main — criar branch descritiva',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
