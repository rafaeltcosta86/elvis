name: PDLC Board Automation

on:
  pull_request:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]
  issues:
    types: [labeled]

env:
  PROJECT_ID: PVT_kwHODpFFL84BUuhX
  STATUS_FIELD_ID: PVTSSF_lAHODpFFL84BUuhXzhCrC38
  STATUS_IDEIA: "cc3d54a1"         # 💡 Ideia
  STATUS_EXPLORACAO: "cbd82d6d"    # 🔍 Exploração
  STATUS_BRAINSTORMING: "ebae8a7e" # 🧠 Brainstorming
  STATUS_DETALHANDO: "e3f3434b"    # 📐 Detalhar Solução
  STATUS_APROVACAO: "56bca1f4"     # ✅ Aprovação
  STATUS_DESENVOLVIMENTO: "6fe4ef2d" # ⚙️ Desenvolvimento
  STATUS_TESTES: "82e693e6"          # 🧪 Testes
  STATUS_CODE_REVIEW: "bf3041ab"   # 👁 Code Review
  STATUS_PULL_REQUEST: "f7c08ab8"  # 🔀 Pull Request
  STATUS_PRODUCAO: "c724aa2c"      # 🚀 Produção

jobs:
  move-violation-to-board:
    name: Violação detectada → 💡 Ideia
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'architecture-violation'
    runs-on: ubuntu-latest
    steps:
      - name: Adicionar issue ao board na coluna Ideia
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issueNodeId = context.payload.issue.node_id;
            const addResult = await github.graphql(`
              mutation($p: ID!, $c: ID!) {
                addProjectV2ItemById(input: {projectId: $p, contentId: $c}) { item { id } }
              }`, { p: process.env.PROJECT_ID, c: issueNodeId });

            if (!addResult.addProjectV2ItemById.item) {
              console.log('Não foi possível adicionar/recuperar o item no board.');
              return;
            }

            const itemId = addResult.addProjectV2ItemById.item.id;
            await github.graphql(`
              mutation($p: ID!, $i: ID!, $f: ID!, $v: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {projectId: $p, itemId: $i, fieldId: $f, value: $v}) {
                  projectV2Item { id }
                }
              }`, { p: process.env.PROJECT_ID, i: itemId, f: process.env.STATUS_FIELD_ID,
                    v: { singleSelectOptionId: process.env.STATUS_IDEIA } });

            console.log(`Issue #${context.payload.issue.number} movida para 💡 Ideia`);

  move-card-on-upstream-label:
    name: Label upstream:* → mover card
    if: github.event_name == 'issues' && startsWith(github.event.label.name, 'upstream:')
    runs-on: ubuntu-latest
    steps:
      - name: Mapear label para coluna e mover card
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const label = context.payload.label.name;
            const statusMap = {
              'upstream:exploracao':      process.env.STATUS_EXPLORACAO,
              'upstream:brainstorming':   process.env.STATUS_BRAINSTORMING,
              'upstream:detalhando':      process.env.STATUS_DETALHANDO,
              'upstream:aprovacao':       process.env.STATUS_APROVACAO,
              'upstream:desenvolvimento': process.env.STATUS_DESENVOLVIMENTO,
              'upstream:testes':          process.env.STATUS_TESTES,
            };
            const optionId = statusMap[label];
            if (!optionId) { console.log(`Label ${label} sem mapeamento.`); return; }

            const issueNodeId = context.payload.issue.node_id;
            const addResult = await github.graphql(`
              mutation($p: ID!, $c: ID!) {
                addProjectV2ItemById(input: {projectId: $p, contentId: $c}) { item { id } }
              }`, { p: process.env.PROJECT_ID, c: issueNodeId });

            const itemId = addResult.addProjectV2ItemById.item.id;
            await github.graphql(`
              mutation($p: ID!, $i: ID!, $f: ID!, $v: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {projectId: $p, itemId: $i, fieldId: $f, value: $v}) {
                  projectV2Item { id }
                }
              }`, { p: process.env.PROJECT_ID, i: itemId, f: process.env.STATUS_FIELD_ID,
                    v: { singleSelectOptionId: optionId } });

            console.log(`Issue #${context.payload.issue.number} movida para ${label}`);

  move-card-on-pr-open:
    name: PR aberto → Code Review (move issue linkada)
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Mover issue linkada para 👁 Code Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner: repoOwner, repo: repoName, pull_number: prNumber
            });

            // Extrair números de issues linkadas via "Closes #N" ou "Fixes #N" no corpo
            const body = pr.body ?? '';
            const linkedIssues = [...body.matchAll(/(?:Closes?|Fixes?|Resolves?)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            const moveItem = async (nodeId) => {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId: process.env.PROJECT_ID, contentId: nodeId });

              const itemId = addResult.addProjectV2ItemById.item.id;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: process.env.PROJECT_ID,
                itemId,
                fieldId: process.env.STATUS_FIELD_ID,
                value: { singleSelectOptionId: process.env.STATUS_CODE_REVIEW }
              });
            };

            if (linkedIssues.length > 0) {
              // Mover as issues linkadas
              for (const issueNumber of linkedIssues) {
                const { data: issue } = await github.rest.issues.get({
                  owner: repoOwner, repo: repoName, issue_number: issueNumber
                });
                await moveItem(issue.node_id);
                console.log(`Issue #${issueNumber} movida para Code Review`);
              }
            } else {
              // Sem issue linkada: adiciona o próprio PR ao board
              await moveItem(pr.node_id);
              console.log(`PR #${prNumber} adicionado ao board em Code Review`);
            }

            // Adicionar label pr:revisao
            await github.rest.issues.addLabels({
              owner: repoOwner, repo: repoName, issue_number: prNumber,
              labels: ['pr:revisao']
            }).catch(() => {});

  move-card-on-review-approved:
    name: PR aprovado → Pull Request
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Mover issue para 🔀 Pull Request + label pr:approved
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner: repoOwner, repo: repoName, pull_number: prNumber
            });

            const body = pr.body ?? '';
            const linkedIssues = [...body.matchAll(/(?:Closes?|Fixes?|Resolves?)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            const moveItemToStatus = async (nodeId, optionId) => {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId: process.env.PROJECT_ID, contentId: nodeId });

              const itemId = addResult.addProjectV2ItemById.item.id;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: process.env.PROJECT_ID,
                itemId,
                fieldId: process.env.STATUS_FIELD_ID,
                value: { singleSelectOptionId: optionId }
              });
            };

            if (linkedIssues.length > 0) {
              for (const issueNumber of linkedIssues) {
                const { data: issue } = await github.rest.issues.get({
                  owner: repoOwner, repo: repoName, issue_number: issueNumber
                });
                await moveItemToStatus(issue.node_id, process.env.STATUS_PULL_REQUEST);
              }
            } else {
              await moveItemToStatus(pr.node_id, process.env.STATUS_PULL_REQUEST);
            }

            // Atualizar labels
            try {
              await github.rest.issues.removeLabel({
                owner: repoOwner, repo: repoName, issue_number: prNumber, name: 'pr:revisao'
              });
            } catch {}
            await github.rest.issues.addLabels({
              owner: repoOwner, repo: repoName, issue_number: prNumber, labels: ['pr:approved']
            }).catch(() => {});

  move-card-on-pr-merge:
    name: PR merged → Produção
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Mover issue linkada para 🚀 Produção
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner: repoOwner, repo: repoName, pull_number: prNumber
            });

            const body = pr.body ?? '';
            const linkedIssues = [...body.matchAll(/(?:Closes?|Fixes?|Resolves?)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            const moveToProducao = async (nodeId) => {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId: process.env.PROJECT_ID, contentId: nodeId });

              const itemId = addResult.addProjectV2ItemById.item.id;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: process.env.PROJECT_ID,
                itemId,
                fieldId: process.env.STATUS_FIELD_ID,
                value: { singleSelectOptionId: process.env.STATUS_PRODUCAO }
              });
            };

            if (linkedIssues.length > 0) {
              for (const issueNumber of linkedIssues) {
                const { data: issue } = await github.rest.issues.get({
                  owner: repoOwner, repo: repoName, issue_number: issueNumber
                });
                await moveToProducao(issue.node_id);
                console.log(`Issue #${issueNumber} movida para Produção`);
              }
            } else {
              await moveToProducao(pr.node_id);
            }
